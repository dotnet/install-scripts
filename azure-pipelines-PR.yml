trigger:
  - main

pr:
  - main

variables:
- template: eng/common-variables.yml

stages:
- stage: build
  displayName: Build
  jobs:
  - template: /eng/common/templates/jobs/jobs.yml
    parameters:
      workspace:
        clean: all
      jobs:
      - job: Windows
        displayName: Tests - Windows (Helix)
        timeoutInMinutes: 60
        pool:
          name: NetCore-Public
          demands: ImageOverride -equals Windows.vs2022.amd64.open

        variables:
        - _BuildConfig: Debug

        preSteps:
        - checkout: self
          clean: true
        steps:
        - powershell: |
            $payload = "$(Agent.TempDirectory)\helix-payload"
            robocopy $(Build.SourcesDirectory) $payload /E /XD artifacts .dotnet .packages /NFL /NDL /NJH /NJS
            if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 }
          displayName: Stage Helix payload
        - template: /eng/common/templates/steps/send-to-helix.yml
          parameters:
            HelixSource: pr/dotnet/install-scripts/$(Build.SourceBranch)
            HelixTargetQueues: windows.amd64.vs2022.open
            WorkItemDirectory: $(Agent.TempDirectory)\helix-payload
            WorkItemCommand: .\Build.cmd -test
            WorkItemTimeout: '00:30:00'
            Creator: install-scripts

      - job: Unix
        displayName: Tests - Unix (Helix)
        timeoutInMinutes: 60
        pool:
          name: NetCore-Public
          demands: ImageOverride -equals build.ubuntu.2204.amd64.open

        variables:
        - _BuildConfig: Debug

        preSteps:
        - checkout: self
          clean: true
        steps:
        - script: |
            rsync -a --exclude='artifacts' --exclude='.dotnet' --exclude='.packages' $(Build.SourcesDirectory)/ $(Agent.TempDirectory)/helix-payload/
          displayName: Stage Helix payload
        - template: /eng/common/templates/steps/send-to-helix.yml
          parameters:
            HelixSource: pr/dotnet/install-scripts/$(Build.SourceBranch)
            HelixTargetQueues: Ubuntu.2204.Amd64.Open;OSX.14.Amd64.Open
            WorkItemDirectory: $(Agent.TempDirectory)/helix-payload
            WorkItemCommand: ./build.sh --test
            HelixPreCommands: 'find . -name "*.sh" | xargs chmod +x'
            WorkItemTimeout: '00:30:00'
            Creator: install-scripts
