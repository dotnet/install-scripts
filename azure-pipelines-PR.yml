trigger:
  - main

pr:
  - main

variables:
- template: eng/common-variables.yml

stages:
- stage: build
  displayName: Build
  jobs:
  - template: /eng/common/templates/jobs/jobs.yml
    parameters:
      workspace:
        clean: all
      jobs:
      - job: Windows
        displayName: Tests - Windows (Helix)
        timeoutInMinutes: 60
        pool:
          name: NetCore-Public
          demands: ImageOverride -equals Windows.vs2022.amd64.open

        variables:
        - _BuildConfig: Debug

        preSteps:
        - checkout: self
          clean: true
        steps:
        - template: /eng/common/templates/steps/send-to-helix.yml
          parameters:
            HelixSource: pr/dotnet/install-scripts/$(Build.SourceBranch)
            HelixTargetQueues: Windows.10.Amd64.Open
            WorkItemDirectory: $(Build.SourcesDirectory)
            WorkItemCommand: Build.cmd -test
            WorkItemTimeout: '00:30:00'
            Creator: install-scripts

      - job: Unix
        displayName: Tests - Unix (Helix)
        timeoutInMinutes: 60
        pool:
          name: NetCore-Public
          demands: ImageOverride -equals build.ubuntu.2204.amd64.open

        variables:
        - _BuildConfig: Debug

        preSteps:
        - checkout: self
          clean: true
        steps:
        - template: /eng/common/templates/steps/send-to-helix.yml
          parameters:
            HelixSource: pr/dotnet/install-scripts/$(Build.SourceBranch)
            HelixTargetQueues: Ubuntu.2204.Amd64.Open;OSX.15.ARM64.Open
            WorkItemDirectory: $(Build.SourcesDirectory)
            WorkItemCommand: build.sh -test
            WorkItemTimeout: '00:30:00'
            Creator: install-scripts
